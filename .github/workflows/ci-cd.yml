name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    # Step 1 — Checkout Repository
    - name: Checkout Repository
      uses: actions/checkout@v3

    # Step 2 — Display Files (Verification Step)
    - name: Display Repository Files
      run: |
        echo "Listing project files..."
        ls -la

    # Step 3 — Security Scan using Trivy
    - name: Run Security Scan (Trivy)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: fs
        scan-ref: .

    # Step 4 — Simulated Deployment Alert
    - name: Deployment Alert
      run: |
        echo "=================================="
        echo "ALERT: CI/CD Pipeline Executed"
        echo "STATUS: Deployment Successful"
        echo "Project: web_task1"
        echo "=================================="

    # Step 5 — Success Message
    - name: Final Status
      run: echo "CI/CD Workflow Completed Successfully"