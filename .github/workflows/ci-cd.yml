name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    # Step 1 — Checkout Repository
    - name: Checkout Repository
      uses: actions/checkout@v3

    # Step 2 — Display Files
    - name: Display Repository Files
      run: |
        echo "Listing project files..."
        ls -la

    # Step 3 — Security Scan using Trivy
    - name: Run Security Scan (Trivy)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: fs
        scan-ref: .

    # Step 4 — Security Alert Check
    - name: Security Alert Check
      run: |
        echo "Running additional security checks..."

        if ls *.exe 1> /dev/null 2>&1; then
          echo "SECURITY ALERT: Executable file detected!"
        else
          echo "No suspicious executable files found."
        fi

    # Step 5 — Deployment Alert
    - name: Deployment Alert
      run: |
        echo "=================================="
        echo "ALERT: CI/CD Pipeline Executed"
        echo "STATUS: Deployment Successful"
        echo "Project: web_task1"
        echo "=================================="

    # Step 6 — Final Status
    - name: Final Status
      run: echo "CI/CD Workflow Completed Successfully"